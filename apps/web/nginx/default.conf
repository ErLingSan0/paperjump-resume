server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;
  etag on;

  location /api/ {
    proxy_pass http://api:8080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /index.html {
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    expires -1;
  }

  location = /favicon.svg {
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    expires -1;
    try_files $uri =404;
  }

  location ^~ /template-previews/ {
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    expires -1;
    try_files $uri =404;
  }

  location ^~ /template-avatars/ {
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    expires -1;
    try_files $uri =404;
  }

  location ~* \.[0-9a-f]{8}\.(?:async\.)?(?:js|mjs|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2)$ {
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    expires 365d;
    try_files $uri =404;
  }

  location ~* \.(?:js|mjs|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2)$ {
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    expires -1;
    try_files $uri =404;
  }

  location / {
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    try_files $uri $uri/ /index.html;
  }
}
