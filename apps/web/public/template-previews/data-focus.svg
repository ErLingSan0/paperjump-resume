    <text x="48" y="714" fill="#20242C" font-size="20">自动驾驶测试工程师</text>
    <text x="824" y="680" text-anchor="end" fill="#13151A" font-size="20" font-weight="700">2021-07 - 2024-07</text>
    <text x="70" y="762" fill="#1F232A" font-size="18">•  主导 L3/L4 级别自动驾驶系统的模拟仿真测试，设计并执行超过 5000 种极端场景测试用例。</text>
    <text x="70" y="794" fill="#1F232A" font-size="18">•  负责实车路测数据采集与分析，规划并执行覆盖 10 万公里的测试路线。</text>
    <text x="70" y="826" fill="#1F232A" font-size="18">•  推动 ISO 26262 导则在自动驾驶测试流程中的落地，负责 HARA 分析与验证策略制定。</text>
    <text x="70" y="858" fill="#1F232A" font-size="18">•  开发并维护自动化测试工具与平台，使用 Python / C++ 编写测试脚本与平台工具。</text>

    <text x="48" y="980" fill="#2E62D4" font-size="34" font-weight="700">项目经历</text>
    <line x1="48" y1="994" x2="824" y2="994" stroke="#2E62D4" stroke-width="4"/>
    <text x="48" y="1048" fill="#13151A" font-size="24" font-weight="700">自动驾驶场景库构建与测试平台开发</text>
    <text x="824" y="1048" text-anchor="end" fill="#13151A" font-size="20" font-weight="700">2022-03 - 2023-01</text>
    <text x="70" y="1096" fill="#1F232A" font-size="18">•  项目背景：为提升自动驾驶系统在复杂交通环境下的鲁棒性，需要构建覆盖多样化场景的测试库。</text>
    <text x="70" y="1128" fill="#1F232A" font-size="18">•  个人职责：负责场景设计、仿真平台集成与自动化测试脚本开发。</text>
    <text x="70" y="1160" fill="#1F232A" font-size="18">•  关键行动：将常见问题类型抽象为标准场景模板，提升复现效率与回归验证速度。</text>
