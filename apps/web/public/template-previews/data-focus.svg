  <g font-family="'PingFang SC','Microsoft YaHei',sans-serif">
    <text x="48" y="274" fill="#2E62D4" font-size="34" font-weight="700">教育经历</text>
    <line x1="48" y1="288" x2="824" y2="288" stroke="#2E62D4" stroke-width="4"/>
    <text x="48" y="350" fill="#13151A" font-size="24" font-weight="700">清华大学</text>
    <text x="48" y="384" fill="#20242C" font-size="20">计算机科学与技术</text>
    <text x="824" y="350" text-anchor="end" fill="#13151A" font-size="20" font-weight="700">2018-09 - 2021-06</text>
    <text x="824" y="380" text-anchor="end" fill="#13151A" font-size="18">硕士</text>
    <text x="70" y="430" fill="#1F232A" font-size="18">•  主修课程：高级操作系统、机器学习、计算机视觉、自动驾驶系统原理等。</text>
    <text x="70" y="462" fill="#1F232A" font-size="18">•  硕士论文：基于深度学习的自动驾驶感知系统鲁棒性研究。</text>
    <text x="70" y="494" fill="#1F232A" font-size="18">•  获得“优秀毕业生”称号，并多次获得“学业优秀奖学金”。</text>

    <text x="48" y="612" fill="#2E62D4" font-size="34" font-weight="700">工作经历</text>
    <line x1="48" y1="626" x2="824" y2="626" stroke="#2E62D4" stroke-width="4"/>
