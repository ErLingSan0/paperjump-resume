    <text x="72" y="906" fill="#1F232A" font-size="18">•  设计并落地社群分层 SOP，根据用户生命周期与价值贡献进行精细化运营。</text>
    <text x="72" y="938" fill="#1F232A" font-size="18">•  通过数据分析确定用户痛点，优化产品功能与营销动作，推动增长目标落到执行层。</text>

