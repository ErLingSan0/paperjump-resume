    <text x="72" y="522" fill="#1F232A" font-size="18">•  主修市场营销策略、消费者行为学、品牌管理、数字营销等课程。</text>
    <text x="72" y="554" fill="#1F232A" font-size="18">•  参与多项市场调研项目，深入分析市场趋势与用户需求。</text>
    <text x="72" y="586" fill="#1F232A" font-size="18">•  论文研究方向：《基于社交媒体的私域流量构建与转化研究》。</text>

