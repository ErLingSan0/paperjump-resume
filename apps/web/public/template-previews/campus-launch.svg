    <text x="114" y="881" fill="#1E2128" font-size="17.5">•  负责多平台矩阵分发和活动策划，覆盖微信、微博、抖音、小红书等主流平台。</text>
    <text x="114" y="912" fill="#1E2128" font-size="17.5">•  独立策划并撰写短视频脚本，成功孵化多条爆款内容，提升传播效率与互动质量。</text>

