services:
  mysql:
    image: mysql:8.4
    container_name: resume-studio-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: resume_platform
      MYSQL_USER: resume
      MYSQL_PASSWORD: resume123
      MYSQL_ROOT_PASSWORD: root123
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql84-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4
    container_name: resume-studio-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql84-data:
  redis-data:
