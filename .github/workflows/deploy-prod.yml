name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Validate required secrets
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_USER: ${{ secrets.PROD_USER }}
          PROD_SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
        run: |
          set -euo pipefail
          test -n "${PROD_HOST}"
          test -n "${PROD_USER}"
          test -n "${PROD_SSH_KEY}"

      - name: Setup SSH
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_PORT: ${{ secrets.PROD_PORT }}
          PROD_SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
        run: |
          set -euo pipefail

          port="${PROD_PORT:-22}"

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${PROD_SSH_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${port}" "${PROD_HOST}" >> ~/.ssh/known_hosts

      - name: Deploy on server
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_PORT: ${{ secrets.PROD_PORT }}
          PROD_USER: ${{ secrets.PROD_USER }}
          PROD_PROJECT_DIR: ${{ vars.PROD_PROJECT_DIR }}
        run: |
          set -euo pipefail

          port="${PROD_PORT:-22}"
          project_dir="${PROD_PROJECT_DIR:-/root/paperjump-resume}"

          ssh -p "${port}" -o StrictHostKeyChecking=yes "${PROD_USER}@${PROD_HOST}" \
            "bash -lc 'set -euo pipefail; cd \"${project_dir}\"; git fetch origin main; git reset --hard origin/main; chmod +x infra/scripts/deploy-prod.sh; DEPLOY_SKIP_GIT_SYNC=1 DEPLOY_BRANCH=main ./infra/scripts/deploy-prod.sh'"
